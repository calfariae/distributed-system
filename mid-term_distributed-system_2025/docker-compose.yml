services:

  # Aggregator
  aggregator:
    build:
      context: .
      dockerfile: Dockerfile.aggregator
    container_name: uts-aggregator
    ports:
      - "8080:8080"
    volumes:
      - dedup_data:/app/data   # persists SQLite dedup store across restarts
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Publisher
  publisher:
    build:
      context: .
      dockerfile: Dockerfile.publisher
    container_name: uts-publisher
    depends_on:
      aggregator:
        condition: service_healthy  # wait until aggregator passes healthcheck
    networks:
      - internal
    restart: "no"               # run once and exit

volumes:
  dedup_data:

networks:
  internal:
    driver: bridge