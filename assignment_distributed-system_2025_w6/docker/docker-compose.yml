version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - distributed-net

  node1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    environment:
      - NODE_ID=node1
      - NODE_PORT=8000
      - REDIS_HOST=redis
      - CLUSTER_NODES=node1:8000,node2:8001,node3:8002
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - distributed-net

  node2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    environment:
      - NODE_ID=node2
      - NODE_PORT=8001
      - REDIS_HOST=redis
      - CLUSTER_NODES=node1:8000,node2:8001,node3:8002
    ports:
      - "8001:8001"
    depends_on:
      - redis
    networks:
      - distributed-net

  node3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    environment:
      - NODE_ID=node3
      - NODE_PORT=8002
      - REDIS_HOST=redis
      - CLUSTER_NODES=node1:8000,node2:8001,node3:8002
    ports:
      - "8002:8002"
    depends_on:
      - redis
    networks:
      - distributed-net

networks:
  distributed-net:
    driver: bridge